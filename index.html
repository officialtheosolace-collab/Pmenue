<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OH7 Pause</title>
  <style>
    :root{
      --bg:#06080b;
      --panel:rgba(10,14,18,.38);
      --line:rgba(255,255,255,.13);
      --text:#e7edf3;
      --muted:#95a2ad;
      --accent:#ff6b4a;
      --accent-soft:rgba(255,107,74,.18);
      --cyan:#8fd6ff;
      --shadow:rgba(0,0,0,.45);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#000;
      overflow:hidden;
    }

    .scene{
      position:relative;
      min-height:100vh;
      background:
        radial-gradient(1200px 600px at 72% 18%, rgba(255,147,110,.15), transparent 45%),
        radial-gradient(900px 500px at 25% 82%, rgba(20,40,60,.35), transparent 45%),
        linear-gradient(180deg, #1b232c 0%, #11171d 28%, #0a0f13 58%, #070a0d 100%);
    }

    /* fake cinematic landscape */
    .fog{
      position:absolute; inset:0;
      background:
        radial-gradient(900px 220px at 55% 55%, rgba(255,255,255,.08), transparent 55%),
        radial-gradient(1000px 260px at 35% 62%, rgba(255,255,255,.06), transparent 58%),
        radial-gradient(800px 180px at 65% 72%, rgba(255,255,255,.04), transparent 50%);
      filter:blur(14px);
      opacity:.85;
      pointer-events:none;
    }

    .mountains{
      position:absolute; inset:auto 0 0 0; height:65%;
      background:
        linear-gradient(180deg, transparent 0 22%, rgba(0,0,0,.04) 22%),
        polygon(0 100%, 0 58%, 10% 52%, 18% 57%, 28% 44%, 39% 53%, 48% 46%, 58% 55%, 68% 43%, 77% 49%, 87% 37%, 100% 50%, 100% 100%);
      pointer-events:none;
    }

    .mountains::before,
    .mountains::after{
      content:"";
      position:absolute; inset:auto 0 0 0;
      height:100%;
      background:#0a0f13;
      clip-path:polygon(0 100%, 0 68%, 10% 58%, 20% 66%, 30% 50%, 42% 61%, 53% 48%, 66% 62%, 77% 44%, 88% 56%, 100% 42%, 100% 100%);
      opacity:.95;
    }

    .mountains::after{
      background:#111820;
      clip-path:polygon(0 100%, 0 76%, 12% 69%, 22% 74%, 31% 64%, 42% 70%, 55% 60%, 67% 72%, 77% 65%, 89% 69%, 100% 61%, 100% 100%);
      opacity:.7;
    }

    .tower{
      position:absolute;
      right:16%;
      bottom:25%;
      width:110px;
      height:280px;
      transform:skew(-2deg);
      z-index:1;
    }

    .tower .mast{
      position:absolute;
      left:50%;
      bottom:0;
      width:14px;
      height:100%;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #2f3c47, #151d24);
      box-shadow:0 0 0 1px rgba(255,255,255,.05);
    }

    .tower .mast::before{
      content:"";
      position:absolute;
      left:-42px; right:-42px; bottom:36px; top:35px;
      background:
        linear-gradient(63deg, transparent 47%, rgba(255,255,255,.10) 48% 52%, transparent 53%),
        linear-gradient(-63deg, transparent 47%, rgba(255,255,255,.10) 48% 52%, transparent 53%);
      background-size:100% 40px;
      opacity:.45;
    }

    .tower .platform{
      position:absolute;
      left:50%;
      top:58px;
      transform:translateX(-50%);
      width:110px;
      height:52px;
      background:linear-gradient(180deg, #27333d, #141b21);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 18px 45px rgba(0,0,0,.35);
    }

    .tower .platform::before{
      content:"";
      position:absolute;
      inset:-10px -8px auto -8px;
      height:10px;
      background:#394854;
      clip-path:polygon(8% 100%, 92% 100%, 100% 0, 0 0);
      opacity:.8;
    }

    .tower .light,
    .tower .light2{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 10px var(--accent), 0 0 24px rgba(255,107,74,.5);
    }

    .tower .light{ top:16px; }
    .tower .light2{ top:92px; width:8px; height:8px; }

    .foreground{
      position:absolute;
      left:0; right:0; bottom:0;
      height:30%;
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,.18)),
        linear-gradient(180deg, #10151a, #07090b);
      border-top:1px solid rgba(255,255,255,.04);
      z-index:2;
    }

    .console{
      position:absolute;
      left:0;
      bottom:0;
      width:28%;
      min-width:220px;
      height:42%;
      background:
        linear-gradient(180deg, rgba(16,20,24,.82), rgba(8,10,12,.96));
      border-right:1px solid rgba(255,255,255,.05);
      box-shadow:20px 0 80px rgba(0,0,0,.28);
      z-index:3;
    }

    .console::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,107,74,.18), transparent 12%),
        linear-gradient(180deg, transparent, rgba(255,255,255,.02));
      pointer-events:none;
    }

    .overlay{
      position:relative;
      z-index:5;
      min-height:100vh;
      padding:7vh 6vw 6vh;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .menu-shell{
      width:min(560px, 88vw);
      background:linear-gradient(180deg, rgba(8,12,16,.18), rgba(8,12,16,.10));
      backdrop-filter: blur(6px);
      border:1px solid rgba(255,255,255,.07);
      box-shadow:0 24px 60px rgba(0,0,0,.18);
      position:relative;
    }

    .menu-shell::before{
      content:"";
      position:absolute;
      left:0; right:0; top:0;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity:.9;
    }

    .menu-head{
      padding:22px 26px 14px;
      position:relative;
    }

    .menu-head::before{
      content:"";
      position:absolute;
      top:26px;
      left:18px;
      width:22px;
      height:1px;
      background:var(--cyan);
      opacity:.8;
    }

    .menu-head::after{
      content:"";
      position:absolute;
      top:26px;
      right:18px;
      width:22px;
      height:1px;
      background:var(--cyan);
      opacity:.8;
    }

    .eyebrow{
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:var(--muted);
      margin-bottom:8px;
    }

    .title{
      font-size:clamp(1.8rem, 4vw, 3.1rem);
      letter-spacing:.08em;
      font-weight:300;
      text-transform:uppercase;
      margin:0;
    }

    .title .accent{
      color:var(--accent);
      font-weight:500;
    }

    .menu-list{
      list-style:none;
      margin:0;
      padding:2px 14px 20px;
    }

    .menu-item{
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      border:0;
      border-top:1px solid rgba(255,255,255,.05);
      background:transparent;
      color:var(--text);
      text-align:left;
      padding:14px 12px;
      font-size:clamp(1.2rem, 2vw, 1.9rem);
      font-weight:300;
      letter-spacing:.02em;
      cursor:pointer;
      transition:background .15s ease, transform .15s ease, color .15s ease;
    }

    .menu-item .arrow{
      color:transparent;
      transition:color .15s ease, transform .15s ease;
    }

    .menu-item.active{
      color:var(--accent);
      background:linear-gradient(90deg, rgba(255,107,74,.10), rgba(255,107,74,.03) 62%, transparent);
    }

    .menu-item.active .arrow{
      color:var(--accent);
      transform:translateX(3px);
    }

    .menu-item:hover{
      background:rgba(255,255,255,.03);
    }

    .detail{
      align-self:flex-end;
      width:min(380px, 76vw);
      background:linear-gradient(180deg, rgba(10,12,15,.55), rgba(10,12,15,.28));
      backdrop-filter: blur(6px);
      border:1px solid rgba(255,255,255,.08);
      padding:18px 18px 16px;
      position:relative;
      box-shadow:0 18px 40px rgba(0,0,0,.15);
    }

    .detail::before{
      content:"";
      position:absolute;
      left:0; top:0;
      width:100%;
      height:2px;
      background:linear-gradient(90deg, var(--accent), transparent 72%);
    }

    .detail-title{
      margin:0 0 10px;
      font-size:1.35rem;
      font-weight:500;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#ffd8cd;
    }

    .detail-text{
      margin:0;
      font-size:1rem;
      line-height:1.55;
      color:#c7d0d9;
    }

    .reward{
      margin-top:12px;
      color:var(--accent);
      font-size:.98rem;
      letter-spacing:.05em;
    }

    .footer-status{
      position:absolute;
      left:50%;
      bottom:4.5vh;
      transform:translateX(-50%);
      font-size:.86rem;
      color:var(--muted);
      letter-spacing:.16em;
      text-transform:lowercase;
      z-index:6;
    }

    .footer-status::before,
    .footer-status::after{
      content:"";
      display:inline-block;
      width:46px;
      height:1px;
      background:rgba(255,255,255,.12);
      vertical-align:middle;
      margin:0 14px;
    }

    @media (max-width: 760px){
      .overlay{
        padding:5vh 4.5vw 5vh;
      }
      .console{
        width:42%;
        min-width:150px;
        height:34%;
      }
      .tower{
        right:10%;
        bottom:29%;
        transform:scale(.82);
      }
      .menu-shell{
        width:min(92vw, 520px);
      }
      .detail{
        width:min(92vw, 360px);
      }
      .footer-status{
        bottom:3.4vh;
        font-size:.74rem;
      }
      .footer-status::before,
      .footer-status::after{
        width:22px;
        margin:0 8px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="fog"></div>
    <div class="mountains"></div>

    <div class="tower">
      <div class="mast"></div>
      <div class="platform"></div>
      <div class="light"></div>
      <div class="light2"></div>
    </div>

    <div class="foreground"></div>
    <div class="console"></div>

    <div class="overlay">
      <section class="menu-shell">
        <div class="menu-head">
          <div class="eyebrow">OH7 system</div>
          <h1 class="title">OH7 <span class="accent">//</span> Pause</h1>
        </div>

        <ul class="menu-list" id="menuList"></ul>
      </section>

      <section class="detail">
        <h2 class="detail-title" id="detailTitle">Upload Artifact</h2>
        <p class="detail-text" id="detailText">
          Log a new or simulated output for today. A day only counts if a file exists.
        </p>
        <div class="reward" id="detailReward">{Reward: +30 XP}</div>
      </section>
    </div>

    <div class="footer-status">operator verified</div>
  </div>

  <script>
    const items = [
      {
        label: "Resume",
        text: "Return to the current objective and continue the run.",
        reward: "{Track: stay in motion}"
      },
      {
        label: "Campaign",
        text: "Check recent logs, current arc, and what the world thinks happened.",
        reward: "{Campfire access}"
      },
      {
        label: "Upload Artifact",
        text: "Log a new or simulated output for today. A day only counts if a file exists.",
        reward: "{Reward: +30 XP}"
      },
      {
        label: "Fight Boss",
        text: "Spawn the current enemy based on drift, procrastination, or chaos level.",
        reward: "{Boss scaling active}"
      },
      {
        label: "Character Sheet",
        text: "Open stats, level, gold, stamina, and current debuffs.",
        reward: "{Theo profile linked}"
      },
      {
        label: "Creative Prompt",
        text: "Generate a clean challenge for music, writing, or building.",
        reward: "{Reward: +20 XP}"
      },
      {
        label: "Daily Mission",
        text: "Receive the one action most likely to move today forward.",
        reward: "{Mission ready}"
      },
      {
        label: "OH7",
        text: "Summon OH7 for guidance, mockery, or recalibration.",
        reward: "{Neural handshake stable}"
      }
    ];

    let selected = 2;
    const menuList = document.getElementById("menuList");
    const detailTitle = document.getElementById("detailTitle");
    const detailText = document.getElementById("detailText");
    const detailReward = document.getElementById("detailReward");

    function render() {
      menuList.innerHTML = "";
      items.forEach((item, i) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.className = "menu-item" + (i === selected ? " active" : "");
        btn.innerHTML = `<span class="arrow">›</span><span>${item.label}</span>`;
        btn.addEventListener("click", () => {
          selected = i;
          updateDetail();
          render();
        });
        li.appendChild(btn);
        menuList.appendChild(li);
      });
    }

    function updateDetail() {
      const item = items[selected];
      detailTitle.textContent = item.label;
      detailText.textContent = item.text;
      detailReward.textContent = item.reward;
    }

    function move(delta) {
      selected = (selected + delta + items.length) % items.length;
      updateDetail();
      render();
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown") move(1);
      if (e.key === "ArrowUp") move(-1);
    });

    let touchStartY = null;
    document.addEventListener("touchstart", (e) => {
      touchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartY == null) return;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dy) > 40) {
        move(dy < 0 ? 1 : -1);
      }
      touchStartY = null;
    }, { passive: true });

    updateDetail();
    render();
  </script>
</body>
</html>
